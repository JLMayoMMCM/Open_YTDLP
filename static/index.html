<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YTDLP UI</title>
  <link rel="stylesheet" href="/vendor/franken/core.min.css">
  <link rel="stylesheet" href="/vendor/franken/utilities.min.css">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/vendor/franken/core.iife.js"></script>
  <script src="/vendor/franken/icon.iife.js"></script>
</head>
<body class="bg-background text-foreground">
  <nav class="uk-navbar uk-navbar-container border-b px-6 py-3 mb-6">
    <div class="uk-navbar-left">
      <span class="text-lg font-semibold">YTDLP UI</span>
    </div>
    <div class="uk-navbar-right flex items-center gap-3">
      <span id="ffmpeg-badge" class="uk-label">checking ffmpeg…</span>
      <button id="settings-toggle" class="uk-btn uk-btn-default uk-btn-sm" type="button">Settings</button>
    </div>
  </nav>

  <main class="uk-container max-w-2xl mx-auto px-4 pb-16">

    <section id="settings-panel" class="uk-card uk-card-default uk-card-body mb-6 hidden">
      <h3 class="uk-card-title">Settings</h3>
      <div class="uk-form-controls mb-3">
        <label class="uk-form-label" for="output-dir">Output directory</label>
        <input id="output-dir" class="uk-input" type="text" placeholder="C:\Users\you\Downloads">
      </div>
      <div id="settings-error" class="uk-alert uk-alert-danger hidden"></div>
      <button id="settings-save" class="uk-btn uk-btn-primary uk-btn-sm" type="button">Save</button>
    </section>

    <section class="uk-card uk-card-default uk-card-body mb-6">
      <h3 class="uk-card-title">Video URL</h3>
      <div class="flex gap-2">
        <input id="url-input" class="uk-input flex-1" type="text" placeholder="https://www.youtube.com/watch?v=…">
        <button id="probe-btn" class="uk-btn uk-btn-primary" type="button">Fetch Info</button>
      </div>
      <div id="probe-error" class="uk-alert uk-alert-danger mt-3 hidden"></div>
    </section>

    <section id="info-card" class="uk-card uk-card-default uk-card-body mb-6 hidden">
      <div class="flex gap-4">
        <img id="info-thumb" class="w-40 h-auto rounded" alt="thumbnail">
        <div class="flex-1">
          <h3 id="info-title" class="uk-card-title mb-1"></h3>
          <p id="info-meta" class="text-sm text-muted-foreground"></p>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-4">
        <div class="uk-form-controls">
          <label class="uk-form-label" for="mode-select">Mode</label>
          <select id="mode-select" class="uk-select">
            <option value="video_audio">Video + Audio</option>
            <option value="video_only">Video only</option>
            <option value="audio_only">Audio only</option>
          </select>
        </div>
        <div class="uk-form-controls" id="resolution-field">
          <label class="uk-form-label" for="resolution-select">Resolution</label>
          <select id="resolution-select" class="uk-select"></select>
        </div>
        <div class="uk-form-controls hidden" id="audio-format-field">
          <label class="uk-form-label" for="audio-format-select">Audio format</label>
          <select id="audio-format-select" class="uk-select">
            <option value="best">Best (no re-encode)</option>
            <option value="mp3">MP3</option>
            <option value="m4a">M4A</option>
          </select>
        </div>
      </div>

      <div id="queue-error" class="uk-alert uk-alert-danger mt-3 hidden"></div>
      <button id="queue-btn" class="uk-btn uk-btn-primary mt-4" type="button">Add to Queue</button>
    </section>

    <section class="uk-card uk-card-default uk-card-body">
      <h3 class="uk-card-title">Downloads</h3>
      <div id="queue-list" class="flex flex-col gap-3">
        <p id="queue-empty" class="text-sm text-muted-foreground">Nothing queued yet.</p>
      </div>
    </section>

  </main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
